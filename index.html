<!DOCTYPE html>
<html>
<head>
<title>Zenith AI</title>

<style>

body{
background:#040a10;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

#container{
width:380px;
height:90vh;
background:#0b1118;
border-radius:20px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 0 40px #00d9ff55;
}

#header{
text-align:center;
padding:12px;
letter-spacing:3px;
background:#07121a;
}

#orb{
width:100px;
height:100px;
border-radius:50%;
margin:auto;

background:
radial-gradient(circle,#ffffff 5%,#00d4ff 30%,#0077ff 60%,transparent 70%);

box-shadow:
0 0 20px #00d4ff,
0 0 60px #00d4ff,
0 0 120px #00d4ff;

animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.15)}
100%{transform:scale(1)}
}

#wave{
height:6px;
width:120px;
background:#00d4ff;
margin:auto;
border-radius:20px;
animation:wave 1s infinite;
}

@keyframes wave{
0%{transform:scaleX(0.3)}
50%{transform:scaleX(1)}
100%{transform:scaleX(0.3)}
}

#chat{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
padding:8px 12px;
margin:6px;
border-radius:12px;
max-width:75%;
}

.user{
background:#0077ff;
align-self:flex-end;
}

.ai{
background:#1b2229;
}

#inputArea{
display:flex;
padding:10px;
gap:6px;
}

input{
flex:1;
padding:8px;
border-radius:10px;
border:none;
background:#111;
color:white;
}

button{
background:#00c8ff;
border:none;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
}

#setup{
position:absolute;
background:#040a10;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
}

</style>
</head>

<body>

<div id="setup">

<h2>Zenith AI Setup</h2>

<input id="name" placeholder="Your name">

<input id="interest" placeholder="Your interests">

<select id="purpose">
<option>Study</option>
<option>Coding</option>
<option>Productivity</option>
<option>General AI</option>
</select>

<button onclick="start()">Start Zenith</button>

</div>

<div id="container">

<div id="header">ZENITH AI</div>

<div id="orb"></div>
<div id="wave"></div>

<div id="chat"></div>

<div id="inputArea">

<input id="input" placeholder="Ask Zenith...">

<button onclick="send()">Send</button>

<button onclick="voice()">🎤</button>

</div>

</div>

<script src="zenith.js"></script>

</body>
</html>
