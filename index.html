<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenith AI</title>

<style>

body{
background:#07080f;
font-family:Arial;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#app{
width:420px;
height:90vh;
background:#0f111a;
border-radius:20px;
border:1px solid #2a2d40;
box-shadow:0 0 40px #6f42c155;
display:flex;
flex-direction:column;
overflow:hidden;
}

header{
background:#101324;
padding:16px;
text-align:center;
border-bottom:1px solid #2a2d40;
}

header h1{
margin:0;
color:#6f42c1;
letter-spacing:3px;
}

header p{
font-size:12px;
opacity:.7;
margin:4px 0 0 0;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
padding:10px 14px;
border-radius:16px;
max-width:80%;
font-size:14px;
}

.user{
align-self:flex-end;
background:#6f42c1;
}

.ai{
align-self:flex-start;
background:#1c1f33;
border:1px solid #30355a;
}

footer{
display:flex;
padding:12px;
gap:8px;
background:#0b0c15;
}

input{
flex:1;
background:#1a1c2c;
border:none;
padding:10px;
border-radius:20px;
color:white;
}

button{
background:#6f42c1;
border:none;
padding:10px 14px;
border-radius:20px;
color:white;
cursor:pointer;
}

#setup{
position:absolute;
background:#07080f;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
gap:10px;
}

#setup input{
width:200px;
}

</style>
</head>

<body>

<div id="app">

<div id="setup">
<h2>Welcome to Zenith AI</h2>
<p>Let's personalize your assistant</p>

<input id="name" placeholder="Your name">
<input id="interest" placeholder="Your interests">

<button onclick="start()">Start</button>

</div>

<header>
<h1>ZENITH AI</h1>
<p>Advanced Personal Assistant</p>
</header>

<div id="chat"></div>

<footer>
<input id="input" placeholder="Ask Zenith...">
<button onclick="send()">Send</button>
</footer>

</div>

<script src="zenith.js"></script>

</body>
</html>
