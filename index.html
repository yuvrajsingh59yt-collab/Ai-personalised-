<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Zenith</title></head>
<body style="background:#1a1a2e;color:white;font-family:sans-serif;padding:20px;">
    <h3>ZENITH AI 🎙️</h3>
    <div id="chat" style="height:300px;overflow-y:auto;border:1px solid #444;padding:10px;margin-bottom:10px;"></div>
    <input type="text" id="in" style="width:70%;padding:10px;border-radius:5px;">
    <button id="go" style="padding:10px;background:#6f42c1;color:white;border:none;">Send</button>
<script>
    const K = "AIzaSyBs-crafcVwaR3j5aG1Bk0vEFOVm_1b-qs";
    let h = [{role:"user",parts:[{text:"Name: Zenith AI. Short answers."}]}];
    function spk(t){window.speechSynthesis.speak(new SpeechSynthesisUtterance(t));}
    async function ask(t){
        const r = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${K}`,{method:'POST',body:JSON.stringify({contents:h.concat({role:"user",parts:[{text:t}]})})});
        const d = await r.json(); const txt = d.candidates[0].content.parts[0].text;
        h.push({role:"user",parts:[{text:t}]},{role:"model",parts:[{text:txt}]});
        spk(txt); return txt;
    }
    document.getElementById('go').onclick = async () => {
        const v = document.getElementById('in').value; if(!v) return;
        document.getElementById('chat').innerHTML += `<p><b>You:</b> ${v}</p>`;
        document.getElementById('in').value = '';
        const res = await ask(v);
        document.getElementById('chat').innerHTML += `<p><b>AI:</b> ${res}</p>`;
    };
</script></body></html>
