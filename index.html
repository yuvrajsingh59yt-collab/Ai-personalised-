<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith AI | Gemini v1beta</title>
    <style>
        :root { --primary: #6f42c1; --bg: #0a0a0f; --panel: #111; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #app { width: 100%; max-width: 500px; height: 90vh; background: var(--panel); border-radius: 20px; display: flex; flex-direction: column; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        header { background: var(--primary); padding: 15px; text-align: center; font-weight: bold; letter-spacing: 2px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 14px; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #222; border: 1px solid #444; border-bottom-left-radius: 2px; }
        footer { padding: 15px; background: #0f0f0f; display: flex; gap: 10px; align-items: center; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #222; color: white; outline: none; }
        button { background: var(--primary); border: none; color: white; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        #preview { max-height: 100px; display: none; margin: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="app">
    <header>ZENITH AI <div style="font-size: 10px; opacity: 0.7;">GEMINI 2.0 FLASH</div></header>
    <div id="chat-box"></div>
    <img id="preview" src="" alt="Image preview">
    <footer>
        <label style="cursor:pointer; font-size: 20px;">🖼️
            <input type="file" id="file-input" hidden accept="image/*">
        </label>
        <input type="text" id="user-input" placeholder="Type a message...">
        <button id="send-btn">Send</button>
    </footer>
</div>

<script type="importmap">
    { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const API_KEY = "AIzaSyCtx5pXyRmc32gULalzgPWvPvEpIzyPjzA"; // ⚠️ Get yours at aistudio.google.com
    const genAI = new GoogleGenerativeAI(API_KEY);
    const model = genAI.getGenerativeModel({ 
        model: "gemini-2.0-flash",
        systemInstruction: "You are Zenith AI, a helpful and witty assistant. Use markdown for formatting."
    });

    // Persistent Chat Session (Memory)
    let chat = model.startChat({ history: [] });

    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const fileInput = document.getElementById('file-input');
    const preview = document.getElementById('preview');

    // Handle Image Preview
    fileInput.onchange = () => {
        const file = fileInput.files[0];
        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
        }
    };

    async function sendMessage() {
        const text = userInput.value;
        const file = fileInput.files[0];
        if (!text && !file) return;

        // UI: Append User Message
        appendMessage('user', text);
        userInput.value = '';
        preview.style.display = 'none';

        // UI: Prepare AI response container
        const aiMsgDiv = appendMessage('ai', '...');

        try {
            let result;
            if (file) {
                // Multimodal: Image + Text
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64Data = reader.result.split(',')[1];
                    const promptParts = [
                        { inlineData: { data: base64Data, mimeType: file.type } },
                        text || "What is in this image?"
                    ];
                    const result = await model.generateContent(promptParts);
                    aiMsgDiv.innerHTML = result.response.text();
                };
            } else {
                // Chat Memory Mode (Streamed for 10x speed feel)
                const result = await chat.sendMessageStream(text);
                aiMsgDiv.innerHTML = '';
                for await (const chunk of result.stream) {
                    aiMsgDiv.innerHTML += chunk.text();
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            }
        } catch (err) {
            aiMsgDiv.innerHTML = "Error: " + err.message;
        }
        fileInput.value = '';
    }

    function appendMessage(role, text) {
        const msg = document.createElement('div');
        msg.className = `msg ${role}`;
        msg.innerHTML = text;
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
        return msg;
    }

    document.getElementById('send-btn').onclick = sendMessage;
    userInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
</script>

</body>
</html>
