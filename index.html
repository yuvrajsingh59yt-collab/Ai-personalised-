<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith AI</title>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 95%; max-width: 400px; height: 85vh; background: #1e1e1e; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #444; }
        #header { background: #6f42c1; padding: 15px; text-align: center; font-weight: bold; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 14px; }
        .user-msg { align-self: flex-end; background: #6f42c1; }
        .ai-msg { align-self: flex-start; background: #333; }
        .input-area { background: #111; padding: 10px; display: flex; gap: 5px; }
        input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; outline: none; }
        button { background: #6f42c1; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">ZENITH AI 🎙️</div>
    <div id="chat-window"><div class="msg ai-msg">System Online. Ready to chat.</div></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type here...">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBs-crafcVwaR3j5aG1Bk0vEFOVm_1b-qs"; 
    // Stable V1 URL
    const URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
    
    let chatHistory = [];

    function speak(t) {
        const u = new SpeechSynthesisUtterance(t);
        window.speechSynthesis.speak(u);
    }

    async function getAIResponse(userText) {
        chatHistory.push({ role: "user", parts: [{ text: userText }] });
        
        try {
            const response = await fetch(URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: chatHistory })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                const aiText = data.candidates[0].content.parts[0].text;
                chatHistory.push({ role: "model", parts: [{ text: aiText }] });
                speak(aiText);
                return aiText;
            } else {
                return "Error: " + (data.error ? data.error.message : "Empty response");
            }
        } catch (e) {
            return "Connection failed. Please check your network.";
        }
    }

    const win = document.getElementById('chat-window');
    const inp = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');

    btn.onclick = async () => {
        const val = inp.value.trim();
        if (!val) return;

        // Show User Message
        win.innerHTML += `<div class="msg user-msg">${val}</div>`;
        inp.value = "";
        win.scrollTop = win.scrollHeight;

        // Show Loading
        const loadId = "ai-" + Date.now();
        win.innerHTML += `<div class="msg ai-msg" id="${loadId}">...</div>`;
        
        const reply = await getAIResponse(val);
        document.getElementById(loadId).innerText = reply;
        win.scrollTop = win.scrollHeight;
    };
</script>

</body>
</html>
