<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith AI Pro</title>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 95%; max-width: 400px; height: 85vh; background: #1a1a1a; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #333; }
        #header { background: #6f42c1; padding: 15px; text-align: center; font-weight: bold; font-size: 1.1rem; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 14px; line-height: 1.4; }
        .user-msg { align-self: flex-end; background: #6f42c1; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #2d2d2d; border-bottom-left-radius: 2px; }
        .input-area { background: #111; padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; background: #252525; border: 1px solid #444; color: white; padding: 10px; border-radius: 20px; outline: none; }
        button { background: #6f42c1; color: white; border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">ZENITH AI PRO 🎙️</div>
    <div id="chat-window"><div class="msg ai-msg">Zenith Pro Online. Ready to assist.</div></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask anything...">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBs-crafcVwaR3j5aG1Bk0vEFOVm_1b-qs"; 
    // Using gemini-pro on v1 stable endpoint
    const URL = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`;
    
    let history = [];

    function speak(t) {
        window.speechSynthesis.cancel(); // Stops previous speech
        const u = new SpeechSynthesisUtterance(t);
        window.speechSynthesis.speak(u);
    }

    async function askAI(txt) {
        history.push({ role: "user", parts: [{ text: txt }] });
        try {
            const r = await fetch(URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: history })
            });
            const d = await r.json();
            
            if (d.candidates && d.candidates[0].content) {
                const reply = d.candidates[0].content.parts[0].text;
                history.push({ role: "model", parts: [{ text: reply }] });
                speak(reply);
                return reply;
            } else {
                return "System error: " + (d.error ? d.error.message : "Resetting connection...");
            }
        } catch (e) {
            return "Connection failed. Check network.";
        }
    }

    const win = document.getElementById('chat-window');
    const inp = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');

    btn.onclick = async () => {
        const val = inp.value.trim();
        if (!val) return;

        win.innerHTML += `<div class="msg user-msg">${val}</div>`;
        inp.value = "";
        win.scrollTop = win.scrollHeight;

        const aiMsg = document.createElement('div');
        aiMsg.className = 'msg ai-msg';
        aiMsg.innerText = "Thinking...";
        win.appendChild(aiMsg);
        
        const reply = await askAI(val);
        aiMsg.innerText = reply;
        win.scrollTop = win.scrollHeight;
    };
</script>

</body>
</html>
