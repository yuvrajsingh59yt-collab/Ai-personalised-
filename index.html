<!DOCTYPE html>
<html>
<head>
    <title>Yuvraj's Personal AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chatbox { width: 90%; max-width: 500px; height: 400px; border: 1px solid #333; overflow-y: auto; padding: 15px; margin-bottom: 10px; border-radius: 10px; background: #1a1a1a; }
        input { width: 90%; max-width: 500px; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; }
        button { margin-top: 10px; padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>🚀 Yuvraj's AI Assistant</h2>
    <div id="chatbox"></div>
    <input type="text" id="userInput" placeholder="Ask me anything...">
    <button onclick="askAI()">Send Message</button>

    <script>
        async function askAI() {
            const msg = document.getElementById('userInput').value;
            const chat = document.getElementById('chatbox');
            chat.innerHTML += `<p><b>You:</b> ${msg}</p>`;
            
            const res = await fetch('https://ai-personalised.onrender.com/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    profile: "I am Yuvraj, an ambitious student focused on growth.",
                    message: msg
                })
            });
            const data = await res.json();
            chat.innerHTML += `<p style="color:#00ff88"><b>AI:</b> ${data.response}</p><hr>`;
            document.getElementById('userInput').value = '';
        }
    </script>
</body>
</html>
