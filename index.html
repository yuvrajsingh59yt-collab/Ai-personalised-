<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith AI</title>
    <style>
        body { font-family: sans-serif; background: radial-gradient(circle, #1a1a2e, #0f0f0f); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 95%; max-width: 400px; height: 85vh; background: rgba(30, 30, 30, 0.9); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #444; }
        #header { background: #6f42c1; padding: 15px; text-align: center; font-weight: bold; letter-spacing: 2px; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 15px; font-size: 14px; }
        .user-msg { align-self: flex-end; background: #6f42c1; }
        .ai-msg { align-self: flex-start; background: #2a2a2a; border: 1px solid #3d3d3d; }
        .input-area { background: #1a1a1a; padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; background: #252525; border: 1px solid #444; color: white; padding: 10px; border-radius: 20px; outline: none; }
        button { background: #6f42c1; color: white; border: none; padding: 10px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
<div id="chat-container">
    <div id="header">ZENITH AI 🎙️</div>
    <div id="chat-window"><div class="msg ai-msg">Voice active. Ready to chat!</div></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type here...">
        <button id="send-btn">Send</button>
    </div>
</div>
<script>
    const API_KEY = "AIzaSyB-tXTxszCBTlRb2LFMvj4G0z45q9uciIs"; 
    let history = [{role:"user",parts:[{text:"Name: Zenith AI. Always ask a question."}]},{role:"model",parts:[{text:"Hello!"}]}];

    function speak(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }

    async function ask(txt) {
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`;
        history.push({role:"user",parts:[{text:txt}]});
        try {
            const res = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:history})});
            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;
            history.push({role:"model",parts:[{text:reply}]});
            speak(reply);
            return reply;
        } catch(e) { return "Error connecting."; }
    }

    const win = document.getElementById('chat-window');
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');

    btn.onclick = async () => {
        const val = input.value.trim();
        if(!val) return;
        const d = document.createElement('div'); d.className='msg user-msg'; d.innerText=val; win.appendChild(d);
        input.value = '';
        const r = await ask(val);
        const a = document.createElement('div'); a.className='msg ai-msg'; a.innerText=r; win.appendChild(a);
        win.scrollTop = win.scrollHeight;
    };
</script>
</body>
</html>
