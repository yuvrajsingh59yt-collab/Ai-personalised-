<script>
    // 1. CONFIGURATION
    const API_KEY = "AIzaSyARlgMWUKoLRQfeudvdO9mhL9KBmUe-P9s"; 
    
    // Exact model ID for the Lite version
    const MODEL = "gemini-3.1-flash-lite"; 
    
    // CRITICAL FIX: Using v1beta because the 'lite' models are currently beta-only
    const URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;

    let history = [];

    // 2. THE BRAIN
    async function askAI(msg) {
        history.push({ role: "user", parts: [{ text: msg }] });
        try {
            const response = await fetch(URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: history })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                const reply = data.candidates[0].content.parts[0].text;
                history.push({ role: "model", parts: [{ text: reply }] });
                
                // Voice Output
                const u = new SpeechSynthesisUtterance(reply);
                window.speechSynthesis.speak(u);
                
                return reply;
            } else {
                // This will tell us if the API Key itself has been blocked
                console.log(data);
                return "System Status: " + (data.error ? data.error.message : "Checking model availability...");
            }
        } catch (e) {
            return "Connection error. Please check your data/WiFi.";
        }
    }

    // 3. UI CONTROLS
    const win = document.getElementById("chat-window");
    const inp = document.getElementById("user-input");
    const btn = document.getElementById("send-btn");

    async function handleChat() {
        const val = inp.value.trim();
        if (!val) return;

        win.innerHTML += `<div class="msg user-msg">${val}</div>`;
        inp.value = "";
        win.scrollTop = win.scrollHeight;

        const aiId = "ai-" + Date.now();
        win.innerHTML += `<div class="msg ai-msg" id="${aiId}">Thinking...</div>`;
        
        const reply = await askAI(val);
        document.getElementById(aiId).innerText = reply;
        win.scrollTop = win.scrollHeight;
    }

    btn.onclick = handleChat;
    inp.onkeypress = (e) => { if (e.key === "Enter") handleChat(); };
</script>
