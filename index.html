}

#chat-container{

.msg{
max-width:80%;
padding:12px;
border-radius:16px;

}

@keyframes fade{
from{opacity:0; transform:translateY(5px);}
to{opacity:1; transform:translateY(0);}
}

.user-msg{
align-self:flex-end;
background:#6f42c1;
}

.ai-msg{
align-self:flex-start;

}

.typing{
font-style:italic;
opacity:0.7;
}

.input-area{
background:#111;
padding:12px;
display:flex;
gap:8px;
}

input{
flex:1;
background:#252525;
border:1px solid #444;
color:white;
padding:10px;
border-radius:20px;
outline:none;
}

button{
background:#6f42c1;
border:none;
color:white;
padding:10px 12px;
border-radius:20px;
cursor:pointer;
}

button:hover{
background:#7e56d8;
}

</style>
</head>
