<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith AI 2026</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0c; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 95%; max-width: 420px; height: 90vh; background: #121214; border-radius: 24px; display: flex; flex-direction: column; border: 1px solid #2a2a2e; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        #header { background: #6f42c1; padding: 18px; text-align: center; font-weight: 700; font-size: 1.2rem; border-top-left-radius: 24px; border-top-right-radius: 24px; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
        .msg { max-width: 80%; padding: 14px; border-radius: 18px; font-size: 14.5px; line-height: 1.5; }
        .user-msg { align-self: flex-end; background: #6f42c1; color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: #1c1c1e; border: 1px solid #333; border-bottom-left-radius: 4px; }
        .input-area { background: #0a0a0c; padding: 20px; display: flex; gap: 10px; align-items: center; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; }
        input { flex: 1; background: #1c1c1e; border: 1px solid #333; color: white; padding: 12px 18px; border-radius: 30px; outline: none; transition: 0.3s; }
        input:focus { border-color: #6f42c1; }
        .btn-circle { background: #6f42c1; border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .btn-circle:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">ZENITH AI 🎙️</div>
    <div id="chat-window"><div class="msg ai-msg">Zenith 2026 Core Online. How can I assist you today?</div></div>
    <div class="input-area">
        <button class="btn-circle" id="mic-btn" title="Speak">
            <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <input type="text" id="user-input" placeholder="Message Zenith..." autocomplete="off">
        <button class="btn-circle" id="send-btn">
            <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    // 2026 Stable Credentials
    const API_KEY = "AIzaSyBs-crafcVwaR3j5aG1Bk0vEFOVm_1b-qs"; 
    const MODEL = "gemini-2.5-flash"; // Stable 2026 workhorse
    const URL = `https://generativelanguage.googleapis.com/v1/models/${MODEL}:generateContent?key=${API_KEY}`;

    let history = [];

    // Voice Synthesis (TTS)
    function speak(text) {
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 1.05;
        window.speechSynthesis.speak(u);
    }

    // Voice Recognition (STT)
    const micBtn = document.getElementById('mic-btn');
    const recognition = window.SpeechRecognition || window.webkitSpeechRecognition ? new (window.SpeechRecognition || window.webkitSpeechRecognition)() : null;
    
    if (recognition) {
        recognition.onresult = (e) => {
            const transcript = e.results[0][0].transcript;
            document.getElementById('user-input').value = transcript;
            handleChat();
        };
    }

    micBtn.onclick = () => {
        if (!recognition) return alert("Speech recognition not supported on this browser.");
        recognition.start();
        micBtn.style.background = "#ff4b2b"; // Red while listening
        setTimeout(() => micBtn.style.background = "#6f42c1", 3000);
    };

    // AI Logic
    async function askAI(txt) {
        history.push({ role: "user", parts: [{ text: txt }] });
        try {
            const res = await fetch(URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: history })
            });
            const data = await res.json();
            
            if (data.candidates && data.candidates[0].content) {
                const reply = data.candidates[0].content.parts[0].text;
                history.push({ role: "model", parts: [{ text: reply }] });
                speak(reply);
                return reply;
            } else {
                console.error(data);
                return "Zenith encountered an error: " + (data.error ? data.error.message : "Invalid response");
            }
        } catch (e) {
            return "Connection lost. Please check your network.";
        }
    }

    const win = document.getElementById('chat-window');
    const inp = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    async function handleChat() {
        const val = inp.value.trim();
        if (!val) return;

        win.innerHTML += `<div class="msg user-msg">${val}</div>`;
        inp.value = "";
        win.scrollTop = win.scrollHeight;

        const aiId = "ai-" + Date.now();
        win.innerHTML += `<div class="msg ai-msg" id="${aiId}">...</div>`;
        
        const reply = await askAI(val);
        document.getElementById(aiId).innerText = reply;
        win.scrollTop = win.scrollHeight;
    }

    sendBtn.onclick = handleChat;
    inp.onkeypress = (e) => { if (e.key === 'Enter') handleChat(); };
</script>

</body>
</html>
