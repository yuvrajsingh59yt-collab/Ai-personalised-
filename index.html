<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zenith AI</title>

<style>

body{
background:#0a0a0f;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

#app{
width:420px;
height:90vh;
background:#111;
border-radius:20px;
display:flex;
flex-direction:column;
border:1px solid #333;
box-shadow:0 0 20px #6f42c155;
}

header{
background:#6f42c1;
padding:15px;
text-align:center;
font-weight:bold;
letter-spacing:2px;
}

#status{
font-size:12px;
opacity:0.8;
}

#chat{
flex:1;
overflow:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
padding:10px;
border-radius:15px;
max-width:80%;
animation:fade .3s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(5px);}
to{opacity:1;}
}

.user{
align-self:flex-end;
background:#6f42c1;
}

.ai{
align-self:flex-start;
background:#222;
}

.typing{
font-style:italic;
opacity:0.6;
}

footer{
display:flex;
padding:10px;
gap:10px;
background:#0f0f0f;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
background:#222;
color:white;
}

button{
border:none;
background:#6f42c1;
color:white;
padding:10px;
border-radius:20px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="app">

<header>
ZENITH AI
<div id="status">System Online</div>
</header>

<div id="chat"></div>

<footer>
<input id="input" placeholder="Ask Zenith...">
<button id="send">Send</button>
<button id="voice">🎤</button>
</footer>

</div>

<script>

const API_KEY="AIzaSyCA4Ibz9vs0riovEgcRyEcvb5ZtvzRi6jg";

const url=`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`;

const chat=document.getElementById("chat");
const input=document.getElementById("input");

let history=JSON.parse(localStorage.getItem("zenith"))||[];

function save(){
localStorage.setItem("zenith",JSON.stringify(history));
}

function add(text,type){

let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;

chat.appendChild(d);

chat.scrollTop=chat.scrollHeight;

}

function typing(){

let t=document.createElement("div");
t.className="msg ai typing";
t.id="typing";
t.innerText="Zenith processing...";

chat.appendChild(t);

}

function removeTyping(){

let t=document.getElementById("typing");

if(t) t.remove();

}

async function ask(text){

history.push({role:"user",parts:[{text:text}]});

typing();

let res=await fetch(url,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({contents:history})
});

let data=await res.json();

removeTyping();

let reply=data.candidates[0].content.parts[0].text;

history.push({role:"model",parts:[{text:reply}]});

save();

add(reply,"ai");

speechSynthesis.speak(new SpeechSynthesisUtterance(reply));

}

document.getElementById("send").onclick=()=>{

let t=input.value;

if(!t) return;

add(t,"user");

input.value="";

ask(t);

}

const rec=new(window.SpeechRecognition||webkitSpeechRecognition)();

rec.onresult=e=>{
input.value=e.results[0][0].transcript;
document.getElementById("send").click();
};

document.getElementById("voice").onclick=()=>{
rec.start();
}

</script>

</body>
</html>
