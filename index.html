<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith AI 2026</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0c; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 95%; max-width: 420px; height: 90vh; background: #121214; border-radius: 24px; display: flex; flex-direction: column; border: 1px solid #2a2a2e; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        #header { background: #6f42c1; padding: 18px; text-align: center; font-weight: 700; border-top-left-radius: 24px; border-top-right-radius: 24px; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
        .msg { max-width: 80%; padding: 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
        .user-msg { align-self: flex-end; background: #6f42c1; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: #1c1c1e; border: 1px solid #333; border-bottom-left-radius: 4px; }
        .input-area { background: #0a0a0c; padding: 20px; display: flex; gap: 10px; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; }
        input { flex: 1; background: #1c1c1e; border: 1px solid #333; color: white; padding: 12px; border-radius: 30px; outline: none; }
        .send-btn { background: #6f42c1; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; color: white; font-size: 18px; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">ZENITH AI 🎙️</div>
    <div id="chat-window">
        <div class="msg ai-msg">Zenith 3.1 Online. Testing connection...</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Message Zenith..." autocomplete="off">
        <button class="send-btn" id="send-btn">➔</button>
    </div>
</div>

<script>
    // --- 2026 VERIFIED CONFIG ---
    const API_KEY = "AIzaSyARlgMWUKoLRQfeudvdO9mhL9KBmUe-P9s"; 
    
    // Exact ID for today's preview release
    const MODEL = "gemini-3.1-flash-lite-preview"; 
    
    // CRITICAL: Must use v1beta for the 3.1 lite-preview models
    const URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;

    let history = [];

    async function askAI(message) {
        history.push({ role: "user", parts: [{ text: message }] });
        try {
            const response = await fetch(URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: history })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                const reply = data.candidates[0].content.parts[0].text;
                history.push({ role: "model", parts: [{ text: reply }] });
                return reply;
            } else {
                // Returns error message for debugging
                console.error("API Error Detail:", data);
                return "System Alert: " + (data.error ? data.error.message : "Wait 30s and try again.");
            }
        } catch (error) {
            return "Connection error. Check your network status.";
        }
    }

    const win = document.getElementById("chat-window");
    const inp = document.getElementById("user-input");
    const btn = document.getElementById("send-btn");

    async function sendMessage() {
        const text = inp.value.trim();
        if (!text) return;

        win.innerHTML += `<div class="msg user-msg">${text}</div>`;
        inp.value = "";
        win.scrollTop = win.scrollHeight;

        const aiId = "ai-" + Date.now();
        win.innerHTML += `<div class="msg ai-msg" id="${aiId}">Thinking...</div>`;
        win.scrollTop = win.scrollHeight;

        const reply = await askAI(text);
        document.getElementById(aiId).innerText = reply;
        win.scrollTop = win.scrollHeight;
    }

    btn.onclick = sendMessage;
    inp.onkeypress = (e) => { if (e.key === "Enter") sendMessage(); };
</script>

</body>
</html>
