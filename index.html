<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith AI | Integrated Core</title>
    <style>
        :root {
            --glow-blue: #3498db;
            --stark-red: #e74c3c;
        }

        body {
            margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0c29 50%, #000 100%);
            /* 🌌 RED AND BLUE GLOW EFFECTS */
            border-left: 5px solid var(--stark-red);
            border-right: 5px solid var(--glow-blue);
            color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }

        /* 🌀 THE ARC REACTOR */
        #arc-container { flex: 1; display: flex; justify-content: center; align-items: center; }
        #arc-reactor {
            width: 140px; height: 140px; border-radius: 50%;
            background: radial-gradient(circle, #fff 20%, var(--glow-blue) 60%, transparent 100%);
            box-shadow: 0 0 25px var(--glow-blue), inset 0 0 15px #fff;
            transition: 0.4s ease; position: relative;
        }
        #arc-reactor.active {
            animation: pulse 0.8s infinite alternate;
            box-shadow: 0 0 80px var(--glow-blue), 0 0 120px #fff;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }

        /* 💬 CHAT PANEL */
        #chat-panel { 
            width: 90%; max-width: 550px; background: rgba(0, 0, 0, 0.85); 
            padding: 25px; border-radius: 30px 30px 0 0; border: 1px solid #333;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        
        #output { 
            height: 120px; overflow-y: auto; font-size: 15px; 
            line-height: 1.6; color: #00d4ff; margin-bottom: 15px;
            font-family: 'Courier New', Courier, monospace;
        }

        .input-area { display: flex; gap: 12px; }
        input { 
            flex: 1; padding: 15px; border-radius: 25px; border: 1px solid #444; 
            background: #111; color: white; outline: none;
        }
        button { 
            background: linear-gradient(to right, var(--glow-blue), #2980b9);
            border: none; color: white; padding: 0 25px; border-radius: 25px; 
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }
    </style>
</head>
<body>

    <h1 style="margin-top:30px; letter-spacing:5px; font-weight: 300; color: var(--glow-blue);">ZENITH AI</h1>

    <div id="arc-container">
        <div id="arc-reactor"></div>
    </div>

    <div id="chat-panel">
        <div id="output">SYSTEM STANDBY... READY FOR INPUT.</div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Command Zenith AI...">
            <button onclick="processRequest()">SEND</button>
        </div>
    </div>

    <script>
        // 🎙️ VOICE CONFIGURATION
        function speak(text) {
            const speech = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            
            // Search for a deep/manly voice (usually named Google UK English Male or similar)
            speech.voice = voices.find(v => v.name.includes('Male') || v.name.includes('Google UK English')) || voices[0];
            speech.pitch = 0.8; // Lower pitch for a "Manly" feel
            speech.rate = 0.9;  // Slightly slower for authority
            window.speechSynthesis.speak(speech);
        }

        // ⌨️ TYPING ANIMATION
        function typeWriter(text, elementId) {
            let i = 0;
            const element = document.getElementById(elementId);
            element.innerHTML = ""; 
            
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 30); // Speed of typing
                }
            }
            type();
        }

        async function processRequest() {
            const input = document.getElementById('userInput');
            const output = document.getElementById('output');
            const reactor = document.getElementById('arc-reactor');
            const prompt = input.value;
            if(!prompt) return;

            // 🌀 POWER UP ARC REACTOR
            reactor.classList.add('active');
            output.innerHTML = "ANALYZING...";
            input.value = '';

            try {
                // Replace this URL with your actual Vercel link!
                const response = await fetch('/api/chat', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                
                const data = await response.json();
                const reply = data.reply || "Systems disrupted. Check connection.";

                // ⌨️ Typing Effect
                typeWriter(reply, "output");
                // 🎙️ Voice Output
                speak(reply);

            } catch (err) {
                output.innerHTML = "CORE ERROR: CONNECTION FAILED.";
            } finally {
                // Keep glowing for a moment after finish
                setTimeout(() => reactor.classList.remove('active'), 1000);
            }
        }

        // Initial voice load
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
